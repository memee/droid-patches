# -------------------------------------------------
# Mode selection — B2.28 toggle + notched fader
# -------------------------------------------------

# Sub-view selector — B2.26/27/28 mutually exclusive
# _SUBVIEW: 0=normal 1=offset(B2.26) 2=att(B2.27) 3=mode(B2.28)
[buttongroup]
    button1 = B2.26
    button2 = B2.27
    button3 = B2.28
    led1 = L2.26
    led2 = L2.27
    led3 = L2.28
    output = _SUBVIEW

# Derive individual selects — active only in channels view (0=uni 1=bi 2=LFO 3=S&H)
[compare]
    input = _SUBVIEW
    compare = 3
    ifequal = 1
    else = 0
    output = _IS_MODE_RAW

[compare]
    input = _SUBVIEW
    compare = 2
    ifequal = 1
    else = 0
    output = _IS_ATT_RAW

[compare]
    input = _SUBVIEW
    compare = 1
    ifequal = 1
    else = 0
    output = _IS_OFF_RAW

[math]
    input1 = _IS_MODE_RAW
    input2 = -1 * _VIEW + 1
    product = _MODE_SEL

[math]
    input1 = _IS_ATT_RAW
    input2 = -1 * _VIEW + 1
    product = _ATT_SEL

[math]
    input1 = _IS_OFF_RAW
    input2 = -1 * _VIEW + 1
    product = _OFF_SEL

# Fadermatrix gate: any sub-view active in channels view
[compare]
    input = _SUBVIEW
    compare = 0.5
    ifgreater = 1
    else = 0
    output = _SUBVIEW_ACTIVE

[math]
    input1 = _SUBVIEW_ACTIVE
    input2 = -1 * _VIEW + 1
    product = _OVERLAY_ACTIVE

