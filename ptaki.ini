# ptaki_v20.ini

# Experimental: fadermatrix 8x8 grid (8 channels x 8 presets)
# Channels view (B1.8 off): M4 selects preset, faders 1-8 = channels 1-8
# Preset view (B1.8 on):    B2.1-8 selects channel, faders 1-8 = all 8 presets
# FM_B/FM_C use dynamic firstfader to swap fader groups between views

[p2b8]
[b32]
[m4]
[m4]

# -------------------------------------------------
# Preset selection — M4 touch plates
# -------------------------------------------------

[buttongroup]
    button1 = B3.1
    button2 = B3.2
    button3 = B3.3
    button4 = B3.4
    button5 = B4.1
    button6 = B4.2
    button7 = B4.3
    button8 = B4.4
    led1 = L3.1
    led2 = L3.2
    led3 = L3.3
    led4 = L3.4
    led5 = L4.1
    led6 = L4.2
    led7 = L4.3
    led8 = L4.4
    output = _PRESET
    selectionchanged = _PRESET_CHANGED

# -------------------------------------------------
# View toggle — B1.8 tap: 0=channels 1=preset
# -------------------------------------------------

[button]
    button = B1.8
    output = _VIEW
    led = L1.8

# -------------------------------------------------
# Channel selection — B2.1-8 (preset view only)
# -------------------------------------------------

[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    select = _VIEW
    output = _CHAN_SEL

# -------------------------------------------------
# Fadermatrix select + rowcolumn logic (dual view)
# -------------------------------------------------

# FM_A: firstfader=1 (static)   FM_B: firstfader swaps 5↔1
# FM_C: firstfader swaps 1↔5   FM_D: firstfader=5 (static)
[compare]
    input = _PRESET
    compare = 3.5
    ifgreater = 0
    else = 1
    output = _PRESET_LOW

[math]
    input1 = _PRESET
    input2 = 4
    difference = _PRESET_MINUS_4

[compare]
    input = _CHAN_SEL
    compare = 3.5
    ifgreater = 0
    else = 1
    output = _CHAN_LOW

[math]
    input1 = _CHAN_SEL
    input2 = 4
    sum = _CHAN_SEL_PLUS_4

# FM_B firstfader: VIEW=0 → 5, VIEW=1 → 1  (= (1-VIEW)*4 + 1)
[math]
    input1 = -1 * _VIEW + 1
    input2 = 4
    product = _NOT_VIEW_TIMES_4

# Select signals — switch between preset-half and channel-half condition per view
[switch]
    input1 = _PRESET_LOW
    input2 = _CHAN_LOW
    offset = _VIEW
    output1 = _SEL_FA

[switch]
    input1 = _PRESET_LOW
    input2 = -1 * _CHAN_LOW + 1
    offset = _VIEW
    output1 = _SEL_FB

[switch]
    input1 = -1 * _PRESET_LOW + 1
    input2 = _CHAN_LOW
    offset = _VIEW
    output1 = _SEL_FC

[switch]
    input1 = -1 * _PRESET_LOW + 1
    input2 = -1 * _CHAN_LOW + 1
    offset = _VIEW
    output1 = _SEL_FD

# Gated selects — 0 when any overlay view (mode/att/off) is active
[switch]
    input1 = _SEL_FA
    input2 = 0
    offset = _OVERLAY_ACTIVE
    output1 = _GATED_SEL_FA

[switch]
    input1 = _SEL_FB
    input2 = 0
    offset = _OVERLAY_ACTIVE
    output1 = _GATED_SEL_FB

[switch]
    input1 = _SEL_FC
    input2 = 0
    offset = _OVERLAY_ACTIVE
    output1 = _GATED_SEL_FC

[switch]
    input1 = _SEL_FD
    input2 = 0
    offset = _OVERLAY_ACTIVE
    output1 = _GATED_SEL_FD

# Rowcolumn signals — row mode in channels view, col mode in preset view
[switch]
    input1 = _PRESET
    input2 = _CHAN_SEL_PLUS_4
    offset = _VIEW
    output1 = _RC_A

[switch]
    input1 = _PRESET
    input2 = _CHAN_SEL
    offset = _VIEW
    output1 = _RC_B

[switch]
    input1 = _PRESET_MINUS_4
    input2 = _CHAN_SEL_PLUS_4
    offset = _VIEW
    output1 = _RC_C

[switch]
    input1 = _PRESET_MINUS_4
    input2 = _CHAN_SEL
    offset = _VIEW
    output1 = _RC_D
#   rows = presets, Cols=channels

# -------------------------------------------------
# Fadermatrix — 8x8 grid (4 circuits)
# FM_B/FM_C swap fader groups between views via dynamic firstfader
# -------------------------------------------------

# FM_A: presets 0-3 x channels 1-4 — faders 1-4 in both views
[fadermatrix]
    firstfader = 1
    rowcolumn = _RC_A
    select = _GATED_SEL_FA
    output11 = _CV_1_0
    output12 = _CV_2_0
    output13 = _CV_3_0
    output14 = _CV_4_0
    output21 = _CV_1_1
    output22 = _CV_2_1
    output23 = _CV_3_1
    output24 = _CV_4_1
    output31 = _CV_1_2
    output32 = _CV_2_2
    output33 = _CV_3_2
    output34 = _CV_4_2
    output41 = _CV_1_3
    output42 = _CV_2_3
    output43 = _CV_3_3
    output44 = _CV_4_3

# FM_B: presets 0-3 x channels 5-8
# channels view: firstfader=5 (f5-8=ch5-8)
# preset view:   firstfader=1 (f1-4=presets 0-3 for selected ch 5-8)
[fadermatrix]
    firstfader = _NOT_VIEW_TIMES_4 + 1
    rowcolumn = _RC_B
    select = _GATED_SEL_FB
    output11 = _CV_5_0
    output12 = _CV_6_0
    output13 = _CV_7_0
    output14 = _CV_8_0
    output21 = _CV_5_1
    output22 = _CV_6_1
    output23 = _CV_7_1
    output24 = _CV_8_1
    output31 = _CV_5_2
    output32 = _CV_6_2
    output33 = _CV_7_2
    output34 = _CV_8_2
    output41 = _CV_5_3
    output42 = _CV_6_3
    output43 = _CV_7_3
    output44 = _CV_8_3

# FM_C: presets 4-7 x channels 1-4
# channels view: firstfader=1 (f1-4=ch1-4)
# preset view:   firstfader=5 (f5-8=presets 4-7 for selected ch 1-4)
[fadermatrix]
    firstfader = _VIEW * 4 + 1
    rowcolumn = _RC_C
    select = _GATED_SEL_FC
    output11 = _CV_1_4
    output12 = _CV_2_4
    output13 = _CV_3_4
    output14 = _CV_4_4
    output21 = _CV_1_5
    output22 = _CV_2_5
    output23 = _CV_3_5
    output24 = _CV_4_5
    output31 = _CV_1_6
    output32 = _CV_2_6
    output33 = _CV_3_6
    output34 = _CV_4_6
    output41 = _CV_1_7
    output42 = _CV_2_7
    output43 = _CV_3_7
    output44 = _CV_4_7

# FM_D: presets 4-7 x channels 5-8 — faders 5-8 in both views
[fadermatrix]
    firstfader = 5
    rowcolumn = _RC_D
    select = _GATED_SEL_FD
    output11 = _CV_5_4
    output12 = _CV_6_4
    output13 = _CV_7_4
    output14 = _CV_8_4
    output21 = _CV_5_5
    output22 = _CV_6_5
    output23 = _CV_7_5
    output24 = _CV_8_5
    output31 = _CV_5_6
    output32 = _CV_6_6
    output33 = _CV_7_6
    output34 = _CV_8_6
    output41 = _CV_5_7
    output42 = _CV_6_7
    output43 = _CV_7_7
    output44 = _CV_8_7

