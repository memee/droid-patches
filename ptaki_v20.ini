# -------------------------------------------------
# Mode selection — B2.28 hold + notched fader
# -------------------------------------------------
# Disabled in preset view. 0=uni 1=bi 2=LFO 3=S&H

[gatetool]
    inputgate = -1 * B2.28 + 1
    outputtrigger = _B2_28_FALL

[math]
    input1 = B2.28
    input2 = -1 * _VIEW + 1
    product = _MODE_SEL

[compare]
    input = B2.28
    compare = 0.5
    ifgreater = 1
    else = 0
    output = L2.28

# ---- Mode fader 1 ----
[motorfader]
    fader = 1
    select = _MODE_SEL
    notches = 4
    preset = _PRESET
    loadpreset = _PRESET_CHANGED
    savepreset = _B2_28_FALL
    startvalue = 0
    ledcolor = _LEDCOLOR_1
    output = _MODE_1

[multicompare]
    input = _MODE_1
    compare1 = 0
    ifequal1 = 0.4
    compare2 = 1
    ifequal2 = 0.8
    compare3 = 2
    ifequal3 = 0.73
    compare4 = 3
    ifequal4 = 0.6
