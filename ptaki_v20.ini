# -------------------------------------------------
# Per-channel signal processing and output
# -------------------------------------------------
# Mode 0: unipolar  (0..1)
# Mode 1: bipolar   (_FADER_CV * 2 - 1 = -1..1)
# Mode 2: LFO sine  (rate from _FADER_CV)
# Mode 3: S&H       (random, clocked by LFO square)

# ---- Channel 1 ----
[math]
    input1 = _FADER_CV_1
    input2 = 2
    product = _BI_1

[math]
    input1 = _BI_1
    input2 = 1
    difference = _BIPOLAR_CV_1

[lfo]
    rate = _FADER_CV_1 * 0.8 - 0.5
    bipolar = on
    sine = _LFO_CV_1
    square = _SH_CLOCK_1

[random]
    clock = _SH_CLOCK_1
    output = _SH_OUT_1

[switch]
    input1 = _FADER_CV_1
    input2 = _BIPOLAR_CV_1
    input3 = _LFO_CV_1
    input4 = _SH_OUT_1
    offset = _MODE_1
    output1 = O1

