# ptaki_v20.ini
# Experimental: fadermatrix 8x8 grid (8 channels x 8 presets)
# Channels view: M4 buttons select preset, outputs from stored values
# Preset view (B1.8): B2.1-8 selects channel, faders edit all 8 presets

[p2b8]
[b32]
[m4]
[m4]

# -------------------------------------------------
# Preset selection — M4 touch plates
# -------------------------------------------------
[buttongroup]
    button1 = B3.1
    button2 = B3.2
    button3 = B3.3
    button4 = B3.4
    button5 = B4.1
    button6 = B4.2
    button7 = B4.3
    button8 = B4.4
    led1 = L3.1
    led2 = L3.2
    led3 = L3.3
    led4 = L3.4
    led5 = L4.1
    led6 = L4.2
    led7 = L4.3
    led8 = L4.4
    output = _PRESET
    selectionchanged = _PRESET_CHANGED

# -------------------------------------------------
# View toggle — B1.8 tap: 0=channels 1=preset
# -------------------------------------------------
[button]
    button = B1.8
    toggle = 1
    output = _VIEW
    led = L1.8

# -------------------------------------------------
# Channel selection — B2.1-8 (preset view only)
# -------------------------------------------------
[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    select = _VIEW
    output = _CHAN_SEL

# -------------------------------------------------
# Fadermatrix select logic
# -------------------------------------------------
# Channels 1-4 (CHAN_SEL 0-3): FM_A + FM_B
# Channels 5-8 (CHAN_SEL 4-7): FM_C + FM_D

[compare]
    input = _CHAN_SEL
    compare = 3.5
    ifgreater = 0
    else = 1
    output = _CHAN_LOW

[math]
    input1 = _VIEW
    input2 = _CHAN_LOW
    product = _SEL_TOP

[math]
    input1 = _VIEW
    input2 = -1 * _CHAN_LOW + 1
    product = _SEL_BOTTOM

[math]
    input1 = _CHAN_SEL
    input2 = 4
    difference = _ROWCOL_BOTTOM

# -------------------------------------------------
# Fadermatrix — 8x8 grid (4 circuits)
# Rows=channels, Cols=presets (both 0-indexed)
# -------------------------------------------------

# FM_A: channels 1-4, presets 0-3, faders 1-4
[fadermatrix]
    firstfader = 1
    rowcolumn = _CHAN_SEL
    select = _SEL_TOP
    output11 = _CV_1_0
    output12 = _CV_1_1
    output13 = _CV_1_2
    output14 = _CV_1_3
    output21 = _CV_2_0
    output22 = _CV_2_1
    output23 = _CV_2_2
    output24 = _CV_2_3
    output31 = _CV_3_0
    output32 = _CV_3_1
    output33 = _CV_3_2
    output34 = _CV_3_3
    output41 = _CV_4_0
    output42 = _CV_4_1
    output43 = _CV_4_2
    output44 = _CV_4_3

# FM_B: channels 1-4, presets 4-7, faders 5-8
[fadermatrix]
    firstfader = 5
    rowcolumn = _CHAN_SEL
    select = _SEL_TOP
    output11 = _CV_1_4
    output12 = _CV_1_5
    output13 = _CV_1_6
    output14 = _CV_1_7
    output21 = _CV_2_4
    output22 = _CV_2_5
    output23 = _CV_2_6
    output24 = _CV_2_7
    output31 = _CV_3_4
    output32 = _CV_3_5
    output33 = _CV_3_6
    output34 = _CV_3_7
    output41 = _CV_4_4
    output42 = _CV_4_5
    output43 = _CV_4_6
    output44 = _CV_4_7

# FM_C: channels 5-8, presets 0-3, faders 1-4
[fadermatrix]
    firstfader = 1
    rowcolumn = _ROWCOL_BOTTOM
    select = _SEL_BOTTOM
    output11 = _CV_5_0
    output12 = _CV_5_1
    output13 = _CV_5_2
    output14 = _CV_5_3
    output21 = _CV_6_0
    output22 = _CV_6_1
    output23 = _CV_6_2
    output24 = _CV_6_3
    output31 = _CV_7_0
    output32 = _CV_7_1
    output33 = _CV_7_2
    output34 = _CV_7_3
    output41 = _CV_8_0
    output42 = _CV_8_1
    output43 = _CV_8_2
    output44 = _CV_8_3

# FM_D: channels 5-8, presets 4-7, faders 5-8
[fadermatrix]
    firstfader = 5
    rowcolumn = _ROWCOL_BOTTOM
    select = _SEL_BOTTOM
    output11 = _CV_5_4
    output12 = _CV_5_5
    output13 = _CV_5_6
    output14 = _CV_5_7
    output21 = _CV_6_4
    output22 = _CV_6_5
    output23 = _CV_6_6
    output24 = _CV_6_7
    output31 = _CV_7_4
    output32 = _CV_7_5
    output33 = _CV_7_6
    output34 = _CV_7_7
    output41 = _CV_8_4
    output42 = _CV_8_5
    output43 = _CV_8_6
    output44 = _CV_8_7

