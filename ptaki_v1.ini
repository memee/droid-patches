# ============================================================
[p2b8]
[b32]
[m4]
[m4]

[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    output = _PRESET
#   fader = 1          -- first fader of the first M4
#   preset = _PRESET    -- cable from buttongroup. Each
#   output = O1         -- Master CV out 1

# ---------- Motor fader with preset recall ----------------
# motorfader (16.47):
# (faders are globally numbered:
# fader 5 = first fader of M4 #2)
# distinct integer on this cable is
# a separate stored value.
# Long-press (1s) on fader 1 touch plate toggles uni/bipolar
[button]
    button = B3.1
    states = 1
    longpresstime = 1
    longpress = _MODE_TOGGLE_1

[button]
    button = _MODE_TOGGLE_1
    preset = _PRESET
    output = _MODE1

[motorfader]
    fader = 1
    preset = _PRESET
    outputscale = 1 + _MODE1 # 1 uni, 2 bi
    outputoffset = _MODE1 * -1 # 0 uni, -1 bi
    output = O1
    ledvalue = 1
    ledcolor = _MODE1 * 0.4 + 0.4 # 0.4 green uni, 0.8 red bi
