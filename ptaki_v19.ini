# -------------------------------------------------
# Drilldown: idle non-drillable faders to bottom
# -------------------------------------------------
# _DISABLE_N = B2.31 - _DRILL_ACTIVE_N: 1 only when drilldown is held
# AND the fader is not in LFO or S&H mode (no drill motorfader active).
# _DRILL_ACTIVE_N = (_IS_LFOMODE_N + _IS_SHMODE_N) * B2.31

[math]
    input1 = _IS_LFOMODE_1
    input2 = B2.31
    product = _DRILL_ACTIVE_1

[math]
    input1 = B2.31
    input2 = _DRILL_ACTIVE_1
    difference = _DISABLE_1

[unusedfaders]
    firstfader = 1
    numfaders = 1
    select = _DISABLE_1

[math]
    input1 = _IS_LFOMODE_2
    input2 = _IS_SHMODE_2
    sum = _IS_DRILLMODE_2

[math]
    input1 = _IS_DRILLMODE_2
    input2 = B2.31
    product = _DRILL_ACTIVE_2

[math]
    input1 = B2.31
    input2 = _DRILL_ACTIVE_2
    difference = _DISABLE_2

[unusedfaders]
    firstfader = 2
    numfaders = 1
