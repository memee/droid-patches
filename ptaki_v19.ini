# -------------------------------------------------
# Algoquencer — channel 1, mode 3 (cyan LED)
# -------------------------------------------------
# B2.30 not held: fader 1 = activity, O1 = pitch output.
# B2.30 held (drilldown): M4 touch plates = step gates,
#   faders 1-8 = per-step pitch (pitch1-8).
# Clock: I1. N1 normalizes I1 to internal LFO when unpatched.
# Internal clock rate: P1.1 (p2b8 pot 1), ~30-240 BPM.
# Gate output: G1 (active only when channel 1 is in algo mode).

# Internal clock: P1.1 -> rate -> square wave -> N1
# N1 is the normalization register for I1: used when I1 unpatched.
[lfo]
    rate = P1.1 * 0.32 + 0.14
    square = N1

[algoquencer]
    clock = I1
    button1 = B3.1
    button2 = B3.2
    button3 = B3.3
    button4 = B3.4
    button5 = B4.1
    button6 = B4.2
    button7 = B4.3
    button8 = B4.4
    led1 = L3.1
    led2 = L3.2
    led3 = L3.3
    led4 = L3.4
    led5 = L4.1
    led6 = L4.2
    led7 = L4.3
    led8 = L4.4
    length = 8
    activity = _FADER_CV_1
    pitch1 = _ALGO_PITCH_RAW_1
    pitch2 = _ALGO_PITCH_RAW_2
    pitch3 = _ALGO_PITCH_RAW_3
    pitch4 = _ALGO_PITCH_RAW_4
    pitch5 = _ALGO_PITCH_RAW_5
    pitch6 = _ALGO_PITCH_RAW_6
    pitch7 = _ALGO_PITCH_RAW_7
    pitch8 = _ALGO_PITCH_RAW_8
    select = _ALGO_DRILL
    pitch = _ALGO_PITCH_1
    gate = _ALGO_GATE_1

# Gate to physical output — only when ch1 is in algo mode
[math]
    input1 = _ALGO_GATE_1
    input2 = _IS_ALGOMODE_1
    product = G1

# Test: S&H clock for ch2
[copy]
    input = _SH_CLOCK_2
    output = G2
