# -------------------------------------------------
# Preset selection & bank detection
# -------------------------------------------------
# 16 presets — B2.1-16 (buttons 1-8 = bank A, 9-16 = bank B)
# Disabled in copy mode (B2.17 held) so preset buttons act as copy destinations
[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    button9 = B2.9
    button10 = B2.10
    button11 = B2.11
    button12 = B2.12
    button13 = B2.13
    button14 = B2.14
    button15 = B2.15
    button16 = B2.16
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    led9 = L2.9
    led10 = L2.10
    led11 = L2.11
    led12 = L2.12
    led13 = L2.13
    led14 = L2.14
    led15 = L2.15
    led16 = L2.16
    output = _PRESET
    select = -1 * B2.17 + 1
    selectionchanged = _SEL_CHANGED

# Bank detection: _BANK_B = floor(_PRESET/8)
# = _PRESET/8 - (_PRESET/8 mod 1): 0 for presets 0-7, 1 for 8-15
[math]
    input1 = _PRESET
    input2 = 8
    quotient = _BANK_B_Q

[math]
    input1 = _BANK_B_Q
    input2 = 1
    modulo = _BANK_B_FRAC

[math]
    input1 = _BANK_B_Q
    input2 = _BANK_B_FRAC
    difference = _BANK_B

# -------------------------------------------------
# Copy / Save mode (B2.17)
# -------------------------------------------------
# TAP  B2.17         → saves current fader positions to the active preset
# HOLD B2.17 + tap   → copies current fader positions to each tapped destination preset
# Cross-bank copy is supported: sharewithnext keeps inactive bank tracking the live fader value.
#
# Copy destination buttongroup — active only while B2.17 is held
[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    button9 = B2.9
    button10 = B2.10
    button11 = B2.11
    button12 = B2.12
    button13 = B2.13
    button14 = B2.14
    button15 = B2.15
    button16 = B2.16
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    led9 = L2.9
    led10 = L2.10
    led11 = L2.11
    led12 = L2.12
    led13 = L2.13
    led14 = L2.14
    led15 = L2.15
    led16 = L2.16
    value1 = 1
    value2 = 2
    value3 = 3
    value4 = 4
    value5 = 5
    value6 = 6
    value7 = 7
    value8 = 8
    value9 = 9
    value10 = 10
    value11 = 11
    value12 = 12
    value13 = 13
    value14 = 14
    value15 = 15
    value16 = 16
    minactive = 0
    maxactive = 1
    select = B2.17
    output = _COPY_DEST
    selectionchanged = _COPY_SC

# Copy mode LED indicator
[compare]
    input = B2.17
    compare = 0.5
    ifgreater = 1
    else = 0
    output = L2.17

# Mode-select LED indicator (hold B2.28 = mode fader active)
[compare]
    input = B2.28
    compare = 0.5
    ifgreater = 1
    else = 0
    output = L2.28

# Drilldown-hold LED indicator (hold B2.31 = LFO depth mode)
[compare]
    input = B2.31
    compare = 0.5
    ifgreater = 1
    else = 0
    output = L2.31

# Algo drilldown LED indicator (hold B2.30 = edit algo steps/pitch)
[compare]
    input = B2.30
    compare = 0.5
    ifgreater = 1
    else = 0
    output = L2.30

# Copy trigger: fires when a destination is selected (not when deselected)
[compare]
    input = _COPY_DEST
    compare = 0.5
    ifgreater = _COPY_SC
    else = 0
    output = _COPY_TRIGGER

# Destination slot numbers — bank A buttons 1-8 → slots 0-7, bank B buttons 9-16 → slots 0-7
[math]
    input1 = _COPY_DEST
    input2 = 1
    difference = _COPY_SLOT_A

[math]
    input1 = _COPY_DEST
    input2 = 9
    difference = _COPY_SLOT_B

# Bank B normal slot (= _PRESET - 8, used by bank B motorfaders in triggered mode)
[math]
    input1 = _PRESET
    input2 = 8
    difference = _PRESET_B_SLOT

# Destination bank flag: 1 when destination is bank A (buttons 1-8)
[compare]
    input = _COPY_DEST
    compare = 8.5
    ifgreater = 0
    else = 1
    output = _DEST_BANK_A

# Bank A copy trigger: fires when destination is bank A (cross-bank allowed)
[math]
    input1 = _COPY_TRIGGER
    input2 = _DEST_BANK_A
    product = _COPY_TRIGGER_A

# Bank B copy trigger: fires when destination is bank B (cross-bank allowed)
[math]
    input1 = _COPY_TRIGGER
    input2 = -1 * _DEST_BANK_A + 1
    product = _COPY_TRIGGER_B

# Unified mode preset slot: copy dest as 0-15 for mode button preset copy
[math]
    input1 = _COPY_DEST
    input2 = 1
    difference = _COPY_DEST_SLOT

# Mode preset: follows _PRESET normally, redirects to copy destination during copy
[switch]
    input1 = _PRESET
    input2 = _COPY_DEST_SLOT
    offset = _COPY_TRIGGER
    output1 = _PRESET_MODE

# Load triggers: fire when a preset button is pressed in normal mode (not copy mode)
[compare]
    input = _BANK_B
    compare = 0
    ifequal = _SEL_CHANGED
    else = 0
    output = _LOAD_TRIGGER_A

[compare]
    input = _BANK_B
    compare = 1
    ifequal = _SEL_CHANGED
    else = 0
    output = _LOAD_TRIGGER_B

# Preset selectors: point to current preset normally, briefly redirect to dest during copy
[switch]
    input1 = _PRESET
    input2 = _COPY_SLOT_A
    offset = _COPY_TRIGGER_A
    output1 = _PRESET_A

[switch]
    input1 = _PRESET_B_SLOT
    input2 = _COPY_SLOT_B
    offset = _COPY_TRIGGER_B
    output1 = _PRESET_B

# Save on B2.17 release (rising edge of 1-B2.17 = falling edge of B2.17)
[gatetool]
    inputgate = -1 * B2.17 + 1
    outputtrigger = _SAVE_RELEASE

# Bank-gate the release save to avoid writing to the inactive bank's slots
[math]
    input1 = _SAVE_RELEASE
    input2 = -1 * _BANK_B + 1
    product = _SAVE_RELEASE_A

[math]
    input1 = _SAVE_RELEASE
    input2 = _BANK_B
    product = _SAVE_RELEASE_B

# Combined save: release-save OR copy-save
[math]
    input1 = _SAVE_RELEASE_A
    input2 = _COPY_TRIGGER_A
    sum = _SAVE_A

[math]
    input1 = _SAVE_RELEASE_B
    input2 = _COPY_TRIGGER_B
    sum = _SAVE_B

# -------------------------------------------------
# LFO drilldown
# -------------------------------------------------
# Hold B2.31: LFO-mode faders become depth attenuators (0-1), all others go dark/inactive.
# Release B2.31: saves attenuation per preset; startvalue=1 so unsaved presets default full.
[gatetool]
    inputgate = -1 * B2.31 + 1
    outputtrigger = _B2_31_FALL

# B2.28 mode-select fall trigger
[gatetool]
    inputgate = -1 * B2.28 + 1
    outputtrigger = _B2_28_FALL

# Mode save: on B2.28 release OR copy
[math]
    input1 = _B2_28_FALL
    input2 = _COPY_TRIGGER
    sum = _SAVE_MODE

# Bank-gated B2.31 gate and fall — shared by all channels
[math]
    input1 = B2.31
    input2 = -1 * _BANK_B + 1
    product = _B2_31_A

[math]
    input1 = B2.31
    input2 = _BANK_B
    product = _B2_31_B

[math]
    input1 = _B2_31_FALL
    input2 = -1 * _BANK_B + 1
    product = _B2_31_FALL_A

[math]
    input1 = _B2_31_FALL
    input2 = _BANK_B
    product = _B2_31_FALL_B

# Normal fader selects: 0 for ALL channels while B2.31 or B2.28 held
[math]
    input1 = -1 * _BANK_B + 1
    input2 = _B2_31_A
    difference = _NORM_SEL_A_RAW

[math]
    input1 = _NORM_SEL_A_RAW
    input2 = -1 * B2.28 + 1
    product = _NORM_SEL_A

[math]
    input1 = _BANK_B
    input2 = _B2_31_B
    difference = _NORM_SEL_B_RAW

[math]
    input1 = _NORM_SEL_B_RAW
    input2 = -1 * B2.28 + 1
    product = _NORM_SEL_B

# -------------------------------------------------
# Motor faders: 4 modes per channel
# -------------------------------------------------
# Hold B2.28 + move fader → notched mode selector (4 notches, haptic feedback).
# Release B2.28 → mode saved. Fader returns to CV mode.
# 0=unipolar  1=bipolar  2=LFO  3=algo(ch1)/S&H(ch2-8)
# Hold B2.31: LFO/S&H faders → depth attenuators (orange/yellow LED).
# Non-drillable faders → motor inactive, LED off.
# Faders 1-4: M4 #1, touch plates B3.1-B3.4, outputs O1-O4
# Faders 5-8: M4 #2, touch plates B4.1-B4.4, outputs O5-O8
# Bank A (sharewithnext) and bank B share one live value per fader.
#
# ---- Fader 1 ----
[motorfader]
    fader = 1
    select = B2.28
    notches = 4
    preset = _PRESET_MODE
    loadpreset = _SEL_CHANGED
    savepreset = _SAVE_MODE
    startvalue = 0
    ledcolor = _LEDCOLOR_1
    output = _MODE_1

[compare]
    input = _MODE_1
    compare = 1
    ifequal = 1
    else = 0
    output = _IS_BIMODE_1

[multicompare]
    input = _MODE_1
    compare1 = 0
    ifequal1 = 0.4
    compare2 = 1
    ifequal2 = 0.8
    compare3 = 2
    ifequal3 = 0.73
    compare4 = 3
    ifequal4 = 0.2
    output = _LEDCOLOR_1

[compare]
    input = _MODE_1
    compare = 2
    ifequal = 1
    else = 0
    output = _IS_LFOMODE_1

[compare]
    input = _MODE_1
    compare = 3
    ifequal = 1
    else = 0
    output = _IS_ALGOMODE_1

# _ALGO_DRILL: 1 when B2.30 held, ch1 in algo mode, and B2.28 not held
[math]
    input1 = B2.30
    input2 = _IS_ALGOMODE_1
    product = _ALGO_DRILL_RAW

[math]
    input1 = _ALGO_DRILL_RAW
    input2 = -1 * B2.28 + 1
    product = _ALGO_DRILL

# _SUPPRESS_LED: 0 during algo drill, 1 otherwise
[math]
    input1 = 1
    input2 = _ALGO_DRILL
    difference = _SUPPRESS_LED

# Deselect normal motorfaders during algo drill (releases motor + LED)
[math]
    input1 = _NORM_SEL_A
    input2 = _SUPPRESS_LED
    product = _NORM_SEL_A_ALGO

[math]
    input1 = _NORM_SEL_B
    input2 = _SUPPRESS_LED
    product = _NORM_SEL_B_ALGO

# Save pitch presets when B2.30 is released
[gatetool]
    inputgate = -1 * _ALGO_DRILL + 1
    outputtrigger = _ALGO_DRILL_FALL

[math]
    input1 = _IS_LFOMODE_1
    input2 = _B2_31_A
    product = _DRILL_SEL_1A

[math]
    input1 = _IS_LFOMODE_1
    input2 = _B2_31_B
    product = _DRILL_SEL_1B

[motorfader]
    fader = 1
    preset = _PRESET_A
    select = _NORM_SEL_A_ALGO
    loadpreset = _LOAD_TRIGGER_A
    savepreset = _SAVE_A
    outputscale = 1 + _IS_BIMODE_1
    outputoffset = _IS_BIMODE_1 * -1
    sharewithnext = 1
    ledvalue = 1
    ledcolor = _LEDCOLOR_1

[motorfader]
    fader = 1
    preset = _PRESET_B
    select = _NORM_SEL_B_ALGO
    loadpreset = _LOAD_TRIGGER_B
    savepreset = _SAVE_B
    outputscale = 1 + _IS_BIMODE_1
    outputoffset = _IS_BIMODE_1 * -1
    output = _FADER_CV_1
    ledvalue = 1
    ledcolor = _LEDCOLOR_1

[motorfader]
    fader = 1
    preset = _PRESET_A
    select = _DRILL_SEL_1A
    loadpreset = _LOAD_TRIGGER_A
    savepreset = _B2_31_FALL_A
    startvalue = 1
    ledvalue = 1
    ledcolor = 0.73
    output = _LFO_ATTEN_1A

[motorfader]
    fader = 1
    preset = _PRESET_B_SLOT
    select = _DRILL_SEL_1B
    loadpreset = _LOAD_TRIGGER_B
    savepreset = _B2_31_FALL_B
    startvalue = 1
    ledvalue = 1
    ledcolor = 0.73
    output = _LFO_ATTEN_1B

[switch]
    input1 = _LFO_ATTEN_1A
    input2 = _LFO_ATTEN_1B
    offset = _BANK_B
    output1 = _LFO_ATTEN_1

[lfo]
    rate = _FADER_CV_1 * 0.8 - 0.5
    bipolar = on
    sine = _LFO_CV_1

[math]
    input1 = _LFO_CV_1
    input2 = _LFO_ATTEN_1
    product = _LFO_OUT_1

[switch]
    input1 = _FADER_CV_1
    input2 = _FADER_CV_1
    input3 = _LFO_OUT_1
    input4 = _ALGO_PITCH_1
    offset = _MODE_1
    output1 = O1

