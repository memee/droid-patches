# -------------------------------------------------
# Algo pitch motorfaders — faders 1-8
# -------------------------------------------------
# Independent preset storage (slot 0, separate from normal CV presets).
# Selected only during algo drilldown. Motor snaps to stored pitch on
# drill entry; saves on B2.30 release. ledcolor=0 (white/neutral) so
# algoquencer step LEDs read clean after writing brightness on top.
[motorfader]
    fader = 1
    preset = 0
    select = _ALGO_DRILL
    savepreset = _ALGO_DRILL_FALL
    startvalue = 0.5
    ledvalue = 1
    ledcolor = 0
    output = _ALGO_PITCH_RAW_1

