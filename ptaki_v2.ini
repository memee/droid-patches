[p2b8]
[b32]
[m4]
[m4]

[buttongroup]
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    output = _PRESET

# ---------- Motor fader: uni / bi / LFO ----------------
# Long-press (1s) on fader 1 touch plate cycles 3 modes:
# 0=unipolar  1=bipolar  2=LFO (fader = rate, output to O1)
[button]
    button = B3.1
    states = 1
    longpresstime = 1
    longpress = _MODE_TOGGLE_1

[button]
    button = _MODE_TOGGLE_1
    states = 3
    preset = _PRESET
    output = _MODE1

[multicompare]
    input = _MODE1
    compare1 = 0
    ifequal1 = 1    # uni:  scale 1
    compare2 = 1
    ifequal2 = 2    # bi:   scale 2
    compare3 = 2
    ifequal3 = 1    # LFO:  scale 1
    output = _FADER_SCALE

[multicompare]
    input = _MODE1
    compare1 = 0
    ifequal1 = 0    # uni:  offset 0
    compare2 = 1
    ifequal2 = -1   # bi:   offset -1
    compare3 = 2
    ifequal3 = 0    # LFO:  offset 0
    output = _FADER_OFFSET

[multicompare]
    input = _MODE1
    compare1 = 0
    ifequal1 = 0.4  # uni:  green
    compare2 = 1
    ifequal2 = 0.8  # bi:   red
    compare3 = 2
    ifequal3 = 0.73 # LFO:  orange
    output = _LEDCOLOR

[motorfader]
    fader = 1
    preset = _PRESET
    outputscale = _FADER_SCALE
    outputoffset = _FADER_OFFSET
    output = _FADER_CV
    ledvalue = 1
    ledcolor = _LEDCOLOR

[lfo]
    hz = _FADER_CV * 10
    bipolar = on
    sine = _LFO_CV

[switch]
    input1 = _FADER_CV   # mode 0: unipolar
    input2 = _FADER_CV   # mode 1: bipolar
    input3 = _LFO_CV     # mode 2: LFO
    offset = _MODE1
    output = O1
