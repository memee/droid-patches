    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    button9 = B2.9
    button10 = B2.10
    button11 = B2.11
    button12 = B2.12
    button13 = B2.13
    button14 = B2.14
    button15 = B2.15
    button16 = B2.16
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    led9 = L2.9
    led10 = L2.10
    led11 = L2.11
    led12 = L2.12
    led13 = L2.13
    led14 = L2.14
    led15 = L2.15
    led16 = L2.16
    output = _PRESET

# ---------- Motor faders: uni / bi / LFO ----------------
# Long-press (1s) on fader touch plate cycles 3 modes:
# 0=unipolar  1=bipolar  2=LFO (fader = rate)
# Faders 1-4: M4 #1, touch plates B3.1-B3.4, outputs O1-O4
# Faders 5-8: M4 #2, touch plates B4.1-B4.4, outputs O5-O8
#
# ---- Fader 1 ----
[button]
    button = B3.1
    states = 1
    longpresstime = 1
    longpress = _MODE_TOGGLE_1

[button]
    button = _MODE_TOGGLE_1
    states = 3
    preset = _PRESET
    output = _MODE_1

[compare]
    input = _MODE_1
    compare = 1
    ifequal = 1
    else = 0
    output = _IS_BIMODE_1

[multicompare]
    input = _MODE_1
    compare1 = 0
    ifequal1 = 0.4
    compare2 = 1
    ifequal2 = 0.8
    compare3 = 2
    ifequal3 = 0.73
    output = _LEDCOLOR_1

[motorfader]
    fader = 1
    preset = _PRESET
    outputscale = 1 + _IS_BIMODE_1
    outputoffset = _IS_BIMODE_1 * -1
    output = _FADER_CV_1
    ledvalue = 1
    ledcolor = _LEDCOLOR_1

[lfo]
    rate = _FADER_CV_1 * 4 - 1
    bipolar = on
    sine = _LFO_CV_1

[switch]
    input1 = _FADER_CV_1
    input2 = _FADER_CV_1
    input3 = _LFO_CV_1
    offset = _MODE_1
    output1 = O1

